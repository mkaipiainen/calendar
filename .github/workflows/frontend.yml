name: Build and Push Docker Image

env:
  AZURE_WEBAPP_NAME: metm
  AWS_REGION: 'eu-north-1'
  ECS_TASK_DEFINITION: 'arn:aws:ecs:eu-north-1:211125760731:task/main-cluster/48a1bd6ade5444eb91f29b561de2a7c4'
  ECS_CONTAINER_NAME: 'web-container'
  ECS_SERVICE: 'arn:aws:ecs:eu-north-1:211125760731:service/main-cluster/web-service'
  ECS_CLUSTER: 'arn:aws:ecs:eu-north-1:211125760731:cluster/main-cluster'

permissions:
  contents: 'read'
  packages: 'write'

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@62f4f872db3836360b72999f4b87f1ff13310f3a

      - name: Ensure ECR repository exists
        run: aws ecr describe-repositories --repository-names poltto/calendar-frontend || aws ecr create-repository --repository-name poltto/calendar-frontend

      - name: Lowercase the repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/poltto/calendar-frontend:latest
          file: ./frontend/Dockerfile

      - name: Replace image in ECS task definition
        id: replace-image
        uses: aws-actions/amazon-ecs-render-task-definition@c804dfbdd57f713b6c079302a4c01db7017a36fc
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@df9643053eda01f169e64a0e60233aacca83799a
        with:
          task-definition: ${{ steps.replace-image.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true