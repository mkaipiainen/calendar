name: Build and Push Docker Image

env:
  AZURE_WEBAPP_NAME: metm

permissions:
  contents: 'read'
  packages: 'write'

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITAL_OCEAN_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DIGITAL_OCEAN_REGISTRY }}/calendar-frontend:latest
          file: ./frontend/Dockerfile

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DIGITAL_OCEAN_REGISTRY }}/calendar-api:latest
          file: ./api/Dockerfile

      - name: Build and push revproxy image
        uses: docker/build-push-action@v5
        with:
          context: ./revproxy
          push: true
          tags: ${{ secrets.DIGITAL_OCEAN_REGISTRY }}/calendar-revproxy:latest
          file: ./revproxy/Dockerfile