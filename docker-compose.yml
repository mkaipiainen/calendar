services:
  api:
    build:
      context: ./api
      dockerfile: api/Dockerfile.dev
    volumes:
      - ./api:/app
      - /app/obj/
      - /app/bin/
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    networks:
      - app-network
  frontend:
    image: ghcr.io/mkaipiainen/calendar-frontend:aeb08432ac234a51dc6dc6cd521b3940ba56fb48
    networks:
      - app-network
    ports:
      - "8050:80"
  caddy:
    image: caddy:2
    container_name: oad.caddy.dev
    ports:
      - "80:80"
      - "4200:4200"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - app-network


networks:
  app-network:
