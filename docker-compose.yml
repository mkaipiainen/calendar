services:
  api:
    image: ghcr.io/mkaipiainen/calendar-api:latest
    networks:
      - app-network
  frontend:
    image: ghcr.io/mkaipiainen/calendar-frontend:latest
    networks:
      - app-network
  caddy:
    image: caddy:2
    container_name: oad.caddy.dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - app-network


networks:
  app-network:
