name: Build and Push Docker Image

permissions:
  contents: 'read'
  packages: 'write'

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITAL_OCEAN_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/calendar-frontend:latest
          file: ./frontend/Dockerfile

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/calendar-api:latest
          file: ./api/Dockerfile

      - name: Build and push revproxy image
        uses: docker/build-push-action@v5
        with:
          context: ./revproxy
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/calendar-revproxy:latest
          file: ./revproxy/Dockerfile

      - name: Get and store Droplet IP
        run: echo "DROPLET_IP=$(doctl compute droplet list --format PublicIPv4 --no-header www-1)" >> $GITHUB_ENV

      - name: Create SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{env.DROPLET_IP}} >> ~/.ssh/known_hosts


      - name: Deploy to DigitalOcean Droplet
        run: |
          doctl compute ssh www-1 --ssh-key-path ~/.ssh/id_rsa --ssh-user root -- << EOF
          docker network rm app-default
          docker network create app-default
          
          docker rm -f calendar-frontend calendar-api calendar-revproxy
          docker pull ghcr.io/${{ github.repository_owner }}/calendar-frontend:latest
          docker run -d --name calendar-frontend --network app-default ghcr.io/${{ github.repository_owner }}/calendar-frontend:latest 
          
          docker pull ghcr.io/${{ github.repository_owner }}/calendar-api:latest
          docker run -d --name calendar-api --network app-default ghcr.io/${{ github.repository_owner }}/calendar-api:latest 
          
          docker pull ghcr.io/${{ github.repository_owner }}/calendar-revproxy:latest
          docker run -d --name calendar-revproxy -p 80:80 443:443 --network app-default ghcr.io/${{ github.repository_owner }}/calendar-revproxy:latest 
          EOF
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DOCKER_IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/calendar-frontend:latest
          DOCKER_IMAGE_API: ghcr.io/${{ github.repository_owner }}/calendar-api:latest
          DOCKER_IMAGE_REVPROXY: ghcr.io/${{ github.repository_owner }}/calendar-revproxy:latest
        # Replace <droplet-name-or-ip>, <your-ssh-user>, and <commands> with your actual values